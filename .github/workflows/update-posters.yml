name: Update posters JSON

on:
  schedule:
    # Runs weekly on Sunday at 02:15 UTC. Change as needed.
    - cron: "15 2 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate JSON
        run: |
          python justwatch_india_trending.py
          python all_time_favorites_ott.py

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git add ott_trending.json ott_popular.json
          if git diff --cached --quiet; then
            echo "No staged changes for poster JSON files"
            exit 0
          fi
          git commit -m "chore: auto-update posters JSON"
          git push
